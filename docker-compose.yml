# sudo docker compose up -d --scale analytics-core-celery-worker=6

# Network
networks:
  analytics-core-net:
    driver: bridge
    # external: true


# Services
services:

  # -------------------------
  # Base builder (optionnel)
  # -------------------------
  analytics-core-base:
    build:
      context: .
      dockerfile: dockerfiles.Dockerfile.base
    image: analytics-core-base:latest
    container_name: analytics-core-base
    restart: "no"
    networks:
      - analytics-core-net
    healthcheck:
      test: ["CMD-SHELL", "python --version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # -------------------------
  # PostgreSQL
  # -------------------------
  analytics-core-postgres:
    image: postgres:16
    container_name: analytics-core-postgres
    shm_size: '2g'
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/postgres:/var/lib/postgresql/data
      - ./configs/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./configs/postgres/init:/docker-entrypoint-initdb.d:ro
    command: postgres -c listen_addresses='*' -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - analytics-core-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # Backend API
  # -------------------------
  analytics-core-backend:
    build:
      context: .
      dockerfile: dockerfiles.Dockerfile.backend
    image: analytics-core-backend:latest
    container_name: analytics-core-backend
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}

      POSTGRES_HOST: analytics-core-postgres
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      
      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-80}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-443}

      DOCKERIZED: true
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/logs/backend:/logs/backend
      - ./backend/migrations:/app/backend/migrations:ro
    depends_on:
      analytics-core-postgres:
        condition: service_healthy
    networks:
      - analytics-core-net
    entrypoint: ["/app/shared_libs/init_logs.sh", "backend", "python", "app.py"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      # timeout: 5s
      retries: 5

  # -------------------------
  # CouchDB Workers
  # -------------------------
  analytics-core-workers:
    build:
      context: .
      dockerfile: dockerfiles.Dockerfile.workers
    image: analytics-core-workers:latest
    container_name: analytics-core-workers
    restart: unless-stopped
    env_file: .env
    environment:
      DOCKERIZED: true
      POSTGRES_HOST: ${POSTGRES_HOST:-analytics-core-postgres}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/logs/workers:/logs/workers
    depends_on:
      analytics-core-postgres:
        condition: service_healthy
    networks:
      - analytics-core-net
    deploy:
      replicas: 6
    entrypoint: ["/app/shared_libs/init_logs.sh", "workers", "python", "couchdb_worker.py"]
    healthcheck:
      test: >
        sh -c "
          pgrep -f couchdb_worker.py >/dev/null 2>&1 &&
          pg_isready -h $${POSTGRES_HOST} -U $${POSTGRES_USER} >/dev/null 2>&1
          || exit 1
        "
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s


  # -------------------------
  # AI Service
  # -------------------------
  analytics-core-ai:
    build:
      context: .
      dockerfile: dockerfiles.Dockerfile.ais
    image: analytics-core-ai:latest
    container_name: analytics-core-ai
    env_file: .env
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      POSTGRES_HOST: analytics-core-postgres
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}

      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-80}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-443}

      DOCKERIZED: true
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/logs/ai:/logs/ai
    depends_on:
      analytics-core-backend:
        condition: service_healthy
    networks:
      - analytics-core-net
    entrypoint: ["/app/shared_libs/init_logs.sh", "ai", "python", "ai_service.py"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/ai/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # PgAdmin
  # -------------------------
  analytics-core-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: analytics-core-pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL must be set}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "True"
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: "False"
      PGADMIN_CONFIG_SESSION_EXPIRATION_TIME: 1440
      PGADMIN_CONFIG_MAX_LOGIN_ATTEMPTS: 5
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      analytics-core-postgres:
        condition: service_healthy
    networks:
      - analytics-core-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # -------------------------
  # CloudBeaver
  # -------------------------
  analytics-core-cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: analytics-core-cloudbeaver
    restart: unless-stopped
    env_file: .env
    environment:
      CB_SERVER_NAME: ${DBEAVER_SERVER_NAME:-ANALYTICS CloudBeaver}
      CB_ADMIN_NAME: ${DBEAVER_ADMIN_NAME:?DBEAVER_ADMIN_NAME must be set}
      CB_ADMIN_PASSWORD: ${DBEAVER_ADMIN_PASSWORD:?DBEAVER_ADMIN_PASSWORD must be set}
      CB_SESSION_EXPIRE_TIME: 1440
    volumes:
      - ${PROJECT_DATA_DIR:-../analytics-data}/cloudbeaver:/opt/cloudbeaver/workspace
    ports:
      - "${DBEAVER_PORT:-8978}:8978"
    depends_on:
      analytics-core-postgres:
        condition: service_healthy
    networks:
      - analytics-core-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8978 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -------------------------
  # NGINX
  # -------------------------
  analytics-core-nginx:
    image: nginx:alpine
    container_name: analytics-core-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/certs/default:/etc/letsencrypt
    depends_on:
      analytics-core-backend:
        condition: service_healthy
      analytics-core-ai:
        condition: service_healthy
    networks:
      - analytics-core-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${NGINX_HTTP_PORT:-80}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
