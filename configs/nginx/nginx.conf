# ===========================
# NGINX Reverse Proxy Config
# ===========================

user  nginx;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------
    # Logging
    # -------------------------------
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # -------------------------------
    # Gzip Compression
    # -------------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # -------------------------------
    # Upstream services
    # -------------------------------
    upstream backend {
        server analytics-core-backend:5000;
    }

    upstream ai {
        server analytics-core-ai:5001;
    }

    # upstream pgadmin {
    #     server analytics-core-pgadmin:80;
    # }

    # upstream cloudbeaver {
    #     server analytics-core-cloudbeaver:8978;
    # }

    
    # HTTP Server (Port 80)
    server {
        listen 80;
        server_name _;

        # # Optional: redirect to HTTPS if cert exists
        # if (-f /etc/letsencrypt/live/default/fullchain.pem) {
        #     Redirection conditionnelle vers HTTPS
        #     Uncomment si tu veux forcer HTTPS
        #     return 301 https://$host$request_uri;
        # }

        client_max_body_size 200M;

        location / {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;

        location /ai/ {
            proxy_pass http://ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_redirect off;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # limit_req zone=ai burst=10 nodelay;
        }

        # Static files (si besoin)
        location /static/ {
            alias /app/backend/static/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # location / {
        #     return 404;
        # }
    }

    # HTTPS Server (Port 443) - self-signed fallback
    server {
        listen 443 ssl http2 default_server;
        server_name _;

        ssl_certificate     /etc/letsencrypt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 200M;

        # Backend API
        location / {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # AI Service
        location /ai/ {
            proxy_pass http://ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # access_log /var/log/nginx/api-access.log;
            # error_log /var/log/nginx/api-error.log warn;
        }

        # Static files
        location /static/ {
            alias /app/backend/static/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # # Default fallback
        # location / {
        #     return 404;
        # }
    }
}